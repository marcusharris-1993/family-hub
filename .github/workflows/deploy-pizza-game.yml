name: Deploy Pizza Game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pizza-game/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pizza-game

      - name: Build
        run: npm run build
        working-directory: pizza-game

      - name: Deploy to gh-pages branch
        run: |
          cd pizza-game/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy pizza game"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/marcusharris-1993/family-hub.git HEAD:gh-pages
